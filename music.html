<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Music by Synaptical — original compositions and productions." />
  <title>Music — Synaptical</title>

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <script src="/components/nav.js"    defer></script>
  <script src="/components/footer.js" defer></script>
</head>
<body>

  <site-nav></site-nav>

  <main>
    <div class="container">

      <header class="page-header animate-fade-up">
        <span class="section-label">Music</span>
        <h1>Sound &amp; Signal.</h1>
        <p style="margin-top: 1rem; font-size: 1.05rem;">
          Original tracks, projects, and releases.
        </p>
      </header>

      <!--
        EMBED TIP: To embed a SoundCloud track or playlist, go to the
        track on SoundCloud → click Share → Embed, and paste the iframe here.

        To embed a Spotify track: go to the track → ··· → Share → Embed,
        and paste the iframe code.

        To embed a YouTube video: click Share under the video → Embed,
        and paste the iframe code.

        Example SoundCloud embed (replace with your own):

        <iframe width="100%" height="166" scrolling="no" frameborder="no"
          allow="autoplay"
          src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/YOUR_TRACK_ID">
        </iframe>
      -->

      <div class="grid-3 animate-fade-up delay-1">

        <!-- Repeat this card for each release. Replace placeholder text. -->
        <div class="card">
          <div style="
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--purple-deep), var(--bg-raised));
            border-radius: 4px;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
          ">🎵</div>
          <h3 style="color: #fff; font-size: 1rem; margin-bottom: 0.3rem;">Track Title</h3>
          <p style="font-size: 0.85rem; margin-bottom: 1rem;">2024 &middot; Genre / Mood</p>
          <a href="#" class="btn btn-outline" style="font-size: 0.75rem; padding: 0.55rem 1.2rem;">Listen</a>
        </div>

        <div class="card">
          <div style="
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #1a1040, var(--bg-raised));
            border-radius: 4px;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
          ">🎶</div>
          <h3 style="color: #fff; font-size: 1rem; margin-bottom: 0.3rem;">Track Title</h3>
          <p style="font-size: 0.85rem; margin-bottom: 1rem;">2024 &middot; Genre / Mood</p>
          <a href="#" class="btn btn-outline" style="font-size: 0.75rem; padding: 0.55rem 1.2rem;">Listen</a>
        </div>

        <div class="card">
          <div style="
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #0d1a2e, var(--bg-raised));
            border-radius: 4px;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
          ">🎹</div>
          <h3 style="color: #fff; font-size: 1rem; margin-bottom: 0.3rem;">Track Title</h3>
          <p style="font-size: 0.85rem; margin-bottom: 1rem;">2024 &middot; Genre / Mood</p>
          <a href="#" class="btn btn-outline" style="font-size: 0.75rem; padding: 0.55rem 1.2rem;">Listen</a>
        </div>

      </div>

    </div>
  </main>

  <site-footer></site-footer>

</body>
</html>
