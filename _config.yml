# _config.yml
# Minimal Jekyll config for GitHub Pages.
#
# This disables Jekyll's default behavior of hiding folders/files
# that start with underscores (like _components), and sets your
# site URL. Update the url below with your actual GitHub Pages URL.

url: "https://synapt1cal.github.io"  # ← update this

theme: null

include:
  - components
  - css

exclude:
  - README.md
